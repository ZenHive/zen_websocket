# Deterministic Elixir harness gate for PRs.
# Closes the Codex-env-blocked-hex.pm gap: every PR push gets format / compile /
# credo / doctor / sobelow / test+cover / dialyzer evidence as PR checks, instead
# of needing a local reviewer to fetch the branch and run the suite.
#
# Elixir/OTP are pinned inline (this repo has no `.tool-versions`). Adopting a
# `.tool-versions` and switching to `version-file` would make CI and local dev
# share one source and is the recommended follow-up.

name: Harness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v7

      - id: beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps & _build (covers dialyxir PLT default path)
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            priv/plts
          key: mix-${{ runner.os }}-otp${{ steps.beam.outputs.otp-version }}-elixir${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-otp${{ steps.beam.outputs.otp-version }}-elixir${{ steps.beam.outputs.elixir-version }}-

      - run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      # TODO/FIXME tags are tracked-debt visibility, not regressions — exclude
      # so harness only fails on real Credo issues (see development-philosophy.md
      # § "TODO Comment Requirements").
      - name: Credo (strict, excluding TODO/FIXME design tags)
        run: mix credo --strict --ignore TagTODO,TagFIXME

      - name: Doctor (--raise overrides .doctor.exs raise=false to gate CI)
        run: mix doctor --raise

      - name: Sobelow (honors .sobelow-conf, exit=Low)
        run: mix sobelow

      # Coverage floor: 50% — raw offline figure. NOTE: real core-library coverage
      # is ~79%; the raw total is diluted by Examples.*/Mix.Tasks.*/Testing.* modules
      # that are exercised ONLY by :integration tests (excluded in CI — no creds) and
      # so read ~0% offline. mix.exs already declares these non-production via
      # `test_coverage: [ignore_modules: …]`, but `mix test.json --cover` does not
      # honor that (only built-in `mix test --cover` does). Once ex_unit_json honors
      # the exclusion (tracked task), raise this back to ~80% over core. `test_helper`
      # excludes `:integration` by default, so no `--exclude integration` needed.
      - name: Tests + coverage gate (>=50%)
        run: mix test.json --cover --cover-threshold 50 --summary-only

      # Run in dev (not the job's test env): the dialyzer PLT config in mix.exs
      # (plt_add_deps: :apps_direct + curated plt_add_apps) is OOM-tuned for the
      # library call graph. Under MIX_ENV=test, test/support mock servers pull
      # plug/ranch/cowboy into the analyzed set but not the PLT, yielding false
      # unknown_function warnings. Dev matches the green Code Quality dialyzer and
      # the PLT's design intent. (Those deps are `only: :test`, so they can't be
      # added to plt_add_apps without breaking the dev PLT build.)
      - name: Dialyzer (dev env — matches library PLT tuning)
        run: MIX_ENV=dev mix dialyzer
