# Dependabot version updates. Security updates (vulnerability-driven bumps) are
# enabled separately via the repo's Security & analysis settings.
version: 2
updates:
  # Hex dependencies (mix.lock)
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Pinned action versions in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
